services:
  - type: web
    name: django-rest-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --run-syncdb
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"